<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Route Optimizer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, system-ui;
  background: #0f0f0f;
  color: white;
}

#map {
  height: 55vh;
}

.controls {
  padding: 12px;
}

input, button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

input {
  background: #1f1f1f;
  color: white;
}

button {
  background: #00aaff;
  color: black;
  font-weight: bold;
}

button.secondary {
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <input id="address" placeholder="Add address">
  <button onclick="addAddress()">Add Stop</button>
  <button class="secondary" onclick="useCurrentLocation()">Use Current Location</button>
  <button onclick="optimizeRoute()">Optimize Route</button>
  <button class="secondary" onclick="openInAppleMaps()">Open in Apple Maps</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([32.7767, -96.7970], 12);
let coords = [];
let markers = [];
let routeLayer = null;
let optimizedOrder = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// -------- Geocoding --------
async function geocode(address) {
  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`
  );
  const data = await res.json();
  if (!data.length) throw "Address not found";
  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// -------- Add Address --------
async function addAddress() {
  const input = document.getElementById('address');
  if (!input.value) return;

  try {
    const [lat, lon] = await geocode(input.value);
    coords.push([lon, lat]);

    markers.push(
      L.marker([lat, lon]).addTo(map)
    );

    map.setView([lat, lon], 13);
    input.value = '';
  } catch {
    alert("Could not find address");
  }
}

// -------- Current Location --------
function useCurrentLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    coords.unshift([lon, lat]);

    markers.push(
      L.marker([lat, lon], { title: "Start" })
        .addTo(map)
        .bindPopup("Starting Location")
        .openPopup()
    );

    map.setView([lat, lon], 14);
  }, () => alert("Location denied"));
}

// -------- Optimize Route --------
<script>
async function optimizeRoute() {
  if (coords.length < 2) {
    alert("Add at least 2 stops");
    return;
  }

  if (routeLayer) map.removeLayer(routeLayer);

  const coordStr = coords.map(c => c.join(',')).join(';');
  const url =
    `https://router.project-osrm.org/trip/v1/driving/${coordStr}` +
    `?overview=full&geometries=geojson&source=first`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.trips || !data.trips.length) {
    alert("Route optimization failed");
    console.error(data);
    return;
  }

  // ✅ CORRECT mapping
  optimizedOrder = data.trips[0].waypoints
    .sort((a, b) => a.waypoint_index - b.waypoint_index)
    .map(w => coords[w.index]);

  routeLayer = L.geoJSON(data.trips[0].geometry).addTo(map);
  map.fitBounds(routeLayer.getBounds());
}


// -------- Open Apple Maps --------
function openInAppleMaps() {
  if (!optimizedOrder || optimizedOrder.length < 2) {
    alert("Optimize route first");
    return;
  }

  const origin = optimizedOrder[0].slice().reverse().join(',');
  const destination = optimizedOrder.at(-1).slice().reverse().join(',');

  const waypoints = optimizedOrder
    .slice(1, -1)
    .map(c => c.slice().reverse().join(','))
    .join('|');

  let url = `https://maps.apple.com/?saddr=${origin}&daddr=${destination}&dirflg=d`;

  if (waypoints) url += `&waypoints=${waypoints}`;

  window.location.href = url;
}
</script>

</body>
</html>
