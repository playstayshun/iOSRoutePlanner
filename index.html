<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Route Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root {
      --bg:      #0c0c10;
      --surface: #13131a;
      --raised:  #1c1c26;
      --border:  rgba(255,255,255,.07);
      --text:    #f0f0f5;
      --muted:   #5a5a72;
      --accent:  #00d4ff;
      --accent2: #0095b3;
      --danger:  #ff4455;
      --go:      #00e07a;
      --go2:     #00a858;
      --radius:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── MAP ──────────────────────────────────────────────── */
    #map-wrap {
      position: relative;
      height: 52vh;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    /* Leaflet attribution cleanup */
    .leaflet-control-attribution {
      background: rgba(0,0,0,.5) !important;
      color: rgba(255,255,255,.35) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,.4) !important; }

    /* Pin-mode ring */
    #map.pin-mode { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* Status pill that floats on the map */
    #status-pill {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      z-index: 1000;
      background: var(--accent);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    #status-pill.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── PANEL ─────────────────────────────────────────────── */
    #panel {
      height: 48vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header bar */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text);
    }

    #header h1 span {
      color: var(--accent);
    }

    /* Night-mode toggle — icon button top-right */
    #btn-night {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--raised);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    #btn-night:hover, #btn-night.active { color: var(--accent); background: rgba(0,212,255,.08); }

    /* Input row */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #address {
      flex: 1;
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0 12px;
      height: 40px;
      outline: none;
      transition: border-color .15s;
    }
    #address::placeholder { color: var(--muted); }
    #address:focus { border-color: var(--accent); }

    #btn-add {
      height: 40px;
      padding: 0 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, transform .1s;
    }
    #btn-add:active { transform: scale(.96); background: var(--accent2); }

    /* Action row */
    #action-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .action-btn {
      flex: 1;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--raised);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s, border-color .15s, color .15s, transform .1s;
    }
    .action-btn:active { transform: scale(.96); }

    .action-btn svg { flex-shrink: 0; }

    /* Pin mode button */
    #btn-pin { border-color: rgba(0,212,255,.25); }
    #btn-pin:hover { background: rgba(0,212,255,.08); color: var(--accent); border-color: var(--accent); }
    #btn-pin.active {
      background: rgba(0,212,255,.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Optimize button */
    #btn-optimize { border-color: rgba(0,224,122,.25); }
    #btn-optimize:hover { background: rgba(0,224,122,.08); color: var(--go); border-color: var(--go); }

    /* Clear button */
    #btn-clear { border-color: rgba(255,68,85,.25); }
    #btn-clear:hover { background: rgba(255,68,85,.08); color: var(--danger); border-color: var(--danger); }

    /* ── STOP LIST ─────────────────────────────────────────── */
    #stops-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 12px;
      -webkit-overflow-scrolling: touch;
    }

    #stops-wrap::-webkit-scrollbar { width: 3px; }
    #stops-wrap::-webkit-scrollbar-track { background: transparent; }
    #stops-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .stop-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeSlide .2s ease;
    }
    .stop-item:last-child { border-bottom: none; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stop-num {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--accent);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .25s;
    }
    .stop-num.pending {
      background: var(--raised);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .stop-label {
      flex: 1;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .stop-label strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .stop-remove {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .stop-remove:hover {
      background: rgba(255,68,85,.1);
      border-color: rgba(255,68,85,.3);
      color: var(--danger);
    }

    #empty-state {
      padding: 20px 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    #empty-state strong {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: rgba(240,240,245,.3);
      margin-bottom: 4px;
    }

    /* ── NUMBERED MARKER ───────────────────────────────────── */
    .rr-marker {
      width: 30px; height: 36px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .rr-marker-body {
      position: absolute;
      inset: 0;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 3px 10px rgba(0,0,0,.5);
    }
    .rr-marker-num {
      position: relative;
      z-index: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #000;
      line-height: 1;
      padding-top: 4px; /* optical center above teardrop tip */
    }
    .rr-marker-star .rr-marker-num { font-size: 15px; }
  </style>
</head>

<body>

<div id="map-wrap">
  <div id="status-pill">Tap map to place stop</div>
  <div id="map"></div>
</div>

<div id="panel">

  <div id="header">
    <h1>Simple Route <span>Runner</span></h1>
    <button id="btn-night" onclick="toggleNightMode()" title="Toggle night mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <div id="input-row">
    <input id="address" placeholder="Search address…"
           onkeydown="if(event.key==='Enter')addStop()" autocomplete="off" />
    <button id="btn-add" onclick="addStop()">Add</button>
  </div>

  <div id="action-row">
    <button id="btn-pin" class="action-btn" onclick="togglePinMode()">
      <!-- Pin icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Tap Map
    </button>

    <button id="btn-optimize" class="action-btn" onclick="optimizeRoute()">
      <!-- Route icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Optimize
    </button>

    <button id="btn-clear" class="action-btn" onclick="clearAll()">
      <!-- Trash icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
      Clear
    </button>
  </div>

  <div id="stops-wrap">
    <div id="stops"></div>
    <div id="empty-state">
      <strong>No stops yet</strong>
      Search an address or tap the map to begin
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

  let map = L.map("map", { tap: false, zoomControl: true })
              .setView([37.7749, -122.4194], 12);

  let start      = null;
  let stops      = [];
  let markers    = [];
  let routeOrder = [];
  let routeLine  = null;
  let darkMode   = false;
  let pinMode    = false;

  // ── Tiles ────────────────────────────────────────────────
  const lightTiles = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { maxZoom: 19 }
  );
  const darkTiles = L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { maxZoom: 19 }
  );
  darkTiles.addTo(map); // start dark
  darkMode = true;
  document.body.style.background = "#0c0c10";

  // ── Marker factory ───────────────────────────────────────
  function makeMarker(label, color, isStart) {
    color = color || "#00d4ff";
    const cls = isStart ? "rr-marker rr-marker-star" : "rr-marker";
    return L.divIcon({
      className: "",
      html: `<div class="${cls}">
               <div class="rr-marker-body" style="background:${color}"></div>
               <div class="rr-marker-num">${label}</div>
             </div>`,
      iconSize:    [30, 36],
      iconAnchor:  [15, 36],
      popupAnchor: [0, -38]
    });
  }

  // ── Status pill ──────────────────────────────────────────
  function showPill(text) {
    const p = document.getElementById("status-pill");
    p.textContent = text;
    p.classList.add("show");
  }
  function hidePill() {
    document.getElementById("status-pill").classList.remove("show");
  }

  // ── Pin mode ─────────────────────────────────────────────
  function togglePinMode() {
    pinMode = !pinMode;
    const btn   = document.getElementById("btn-pin");
    const mapEl = document.getElementById("map");

    if (pinMode) {
      btn.classList.add("active");
      mapEl.classList.add("pin-mode");
      showPill("Tap map to place stop");
      map.dragging.disable();
      map.touchZoom.disable();
      map.doubleClickZoom.disable();
      map.scrollWheelZoom.disable();
    } else {
      btn.classList.remove("active");
      mapEl.classList.remove("pin-mode");
      hidePill();
      map.dragging.enable();
      map.touchZoom.enable();
      map.doubleClickZoom.enable();
      map.scrollWheelZoom.enable();
    }
  }

  map.on("click", e => {
    if (!pinMode) return;
    if (navigator.vibrate) navigator.vibrate(25);
    pushStop([e.latlng.lat, e.latlng.lng]);
    optimizeRoute();
  });

  // Desktop hold (non-pin mode)
  let holdTimer = null;
  map.on("mousedown", e => {
    if (pinMode) return;
    holdTimer = setTimeout(() => {
      pushStop([e.latlng.lat, e.latlng.lng]);
      optimizeRoute();
    }, 500);
  });
  map.on("mouseup mouseleave", () => clearTimeout(holdTimer));

  // ── Geolocation ──────────────────────────────────────────
  navigator.geolocation.getCurrentPosition(
    pos => {
      start = [pos.coords.latitude, pos.coords.longitude];
      map.setView(start, 14);
      L.marker(start, { icon: makeMarker("●", "#ff9500", true) })
        .addTo(map)
        .bindPopup("<b>You are here</b>");
    },
    () => alert("Location access is required to build routes."),
    { enableHighAccuracy: true }
  );

  // ── Geocoding ────────────────────────────────────────────
  async function geocode(address) {
    if (!start) throw "No location";
    const [lat, lon] = start;
    const vb = [lon-.25, lat-.25, lon+.25, lat+.25].join(",");
    const r1 = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&viewbox=${vb}&bounded=1`,
      { headers: { Accept: "application/json" } }
    ).then(r => r.json());
    if (r1.length) return [parseFloat(r1[0].lat), parseFloat(r1[0].lon)];

    const r2 = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`
    ).then(r => r.json());
    if (!r2.length) throw "Not found";
    return [parseFloat(r2[0].lat), parseFloat(r2[0].lon)];
  }

  // ── Add stop via input ────────────────────────────────────
  async function addStop() {
    const input = document.getElementById("address");
    const value = input.value.trim();
    if (!value || !start) return;
    const btn = document.getElementById("btn-add");
    btn.textContent = "...";
    btn.style.opacity = ".6";
    try {
      const coord = await geocode(value);
      pushStop(coord);
      input.value = "";
      optimizeRoute();
    } catch {
      input.style.borderColor = "var(--danger)";
      setTimeout(() => input.style.borderColor = "", 1200);
    } finally {
      btn.textContent = "Add";
      btn.style.opacity = "";
    }
  }

  // ── Push stop ─────────────────────────────────────────────
  function pushStop(coord) {
    stops.push(coord);
    const m = L.marker(coord, { icon: makeMarker("·", "#3a3a55") })
      .addTo(map)
      .bindPopup(`Stop ${stops.length}`);
    markers.push(m);
    routeOrder.push(0);
    renderStops();
    document.getElementById("empty-state").style.display = "none";
  }

  // ── Remove stop ───────────────────────────────────────────
  function removeStop(i) {
    map.removeLayer(markers[i]);
    markers.splice(i, 1);
    stops.splice(i, 1);
    routeOrder.splice(i, 1);
    renderStops();
    if (stops.length === 0) {
      clearPolyline();
      document.getElementById("empty-state").style.display = "";
    } else {
      optimizeRoute();
    }
  }

  // ── Render stop list ──────────────────────────────────────
  function renderStops() {
    const el = document.getElementById("stops");
    el.innerHTML = stops.map((_, i) => {
      const n = routeOrder[i];
      const numCls = n ? "stop-num" : "stop-num pending";
      const numLabel = n || "·";
      return `<div class="stop-item">
        <div class="${numCls}">${numLabel}</div>
        <div class="stop-label"><strong>Stop ${i + 1}</strong>Drop ${i + 1}</div>
        <button class="stop-remove" onclick="removeStop(${i})" title="Remove">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>`;
    }).join("");
  }

  // ── Clear polyline ─────────────────────────────────────────
  function clearPolyline() {
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  }

  // ── Clear all ──────────────────────────────────────────────
  function clearAll() {
    clearPolyline();
    markers.forEach(m => map.removeLayer(m));
    markers = []; stops = []; routeOrder = [];
    document.getElementById("stops").innerHTML = "";
    document.getElementById("empty-state").style.display = "";
  }

  // ── Optimize & number ──────────────────────────────────────
  async function optimizeRoute() {
    if (!start || stops.length === 0) return;
    clearPolyline();

    const coords = [start, ...stops].map(c => `${c[1]},${c[0]}`).join(";");
    try {
      const data = await fetch(
        `https://router.project-osrm.org/trip/v1/driving/${coords}` +
        `?source=first&roundtrip=false&geometries=geojson`
      ).then(r => r.json());

      if (!data.trips) { alert("Route failed"); return; }

      const wpts = data.waypoints;
      stops.forEach((_, i) => { routeOrder[i] = wpts[i + 1].waypoint_index; });

      const min = Math.min(...routeOrder);
      routeOrder = routeOrder.map(p => p - min + 1);

      markers.forEach((m, i) => m.setIcon(makeMarker(routeOrder[i], "#00d4ff")));
      renderStops();

      const route = data.trips[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(route, {
        color: "#00d4ff",
        weight: 4,
        opacity: .85
      }).addTo(map);
      map.fitBounds(routeLine.getBounds(), { padding: [24, 24] });

    } catch (err) {
      console.error(err);
    }
  }

  // ── Night mode ────────────────────────────────────────────
  function toggleNightMode() {
    darkMode = !darkMode;
    const btn = document.getElementById("btn-night");
    btn.classList.toggle("active", darkMode);
    if (darkMode) {
      map.removeLayer(lightTiles);
      darkTiles.addTo(map);
    } else {
      map.removeLayer(darkTiles);
      lightTiles.addTo(map);
    }
    if (stops.length > 0) optimizeRoute();
  }

  // Start in dark mode, match toggle state
  document.getElementById("btn-night").classList.add("active");

</script>
</body>
</html>
