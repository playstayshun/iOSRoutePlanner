<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#060405"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SRP</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/99L8Z3HR/srplogo.png"/>
<link rel="apple-touch-icon" href="https://i.ibb.co/99L8Z3HR/srplogo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── TOKENS ───────────────────────────────────────────────────────────── */
:root {
  --ink:      #060405;
  --ink-1:    #0d0809;
  --ink-2:    #160c0e;
  --ink-3:    #1f1214;
  --ink-4:    #2a181b;
  --red:      #e3293a;
  --red-2:    #b82030;
  --red-glow: rgba(227,41,58,.22);
  --red-soft: rgba(227,41,58,.09);
  --green:    #00c96e;
  --green-2:  #00a558;
  --amber:    #f5a622;
  --blue:     #3b9eff;
  --blue-soft:rgba(59,158,255,.10);
  --text:     #ede5e6;
  --text-2:   #a08a8d;
  --text-3:   #5c4447;
  --border:   rgba(255,255,255,.065);
  --border-r: rgba(227,41,58,.2);
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-l:   env(safe-area-inset-left, 0px);
  --safe-r:   env(safe-area-inset-right, 0px);
}

/* ── RESET ────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { position: fixed; width: 100%; height: 100%; overflow: hidden; }
body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--ink); color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ── MAP ──────────────────────────────────────────────────────────────── */
#map { position: fixed; inset: 0; z-index: 0; background: var(--ink); }
.leaflet-control-attribution {
  background: rgba(0,0,0,.5) !important; color: rgba(255,255,255,.28) !important;
  font-size: 9px !important; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.leaflet-control-attribution a { color: rgba(255,255,255,.3) !important; }
.leaflet-control-zoom {
  border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,.55) !important; margin-bottom: 0 !important;
}
.leaflet-bottom.leaflet-right {
  bottom: calc(var(--panel-visible, 240px) + 16px + var(--safe-b)) !important;
  right: calc(10px + var(--safe-r)) !important;
  transition: bottom 0.3s ease;
}
.leaflet-control-zoom a {
  background: rgba(12,7,8,.9) !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  font-size: 18px !important; width: 40px !important; height: 40px !important; line-height: 40px !important;
}
.leaflet-control-zoom a:hover { background: var(--ink-3) !important; color: var(--red) !important; }
#map.pin-mode { outline: 2px solid var(--red); outline-offset: -2px; cursor: crosshair; }

/* GPS dot — orange pulse */
.gps-wrap { position: relative; width: 26px; height: 26px; }
.gps-dot {
  position: absolute; top: 4px; left: 4px; width: 18px; height: 18px; border-radius: 50%;
  background: #ff9500; border: 3px solid rgba(255,255,255,.95);
  box-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 0 4px rgba(255,149,0,.2);
}
.gps-ring {
  position: absolute; inset: -3px; border-radius: 50%;
  border: 1.5px solid rgba(255,149,0,.6);
  animation: gps-pulse 2s ease-out infinite;
}
@keyframes gps-pulse {
  0%   { transform: scale(.65); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}

/* ── RE-CENTER BUTTON ────────── */
#btn-recenter {
  position: fixed;
  bottom: calc(var(--panel-visible, 240px) + 110px + var(--safe-b));
  right: calc(12px + var(--safe-r));
  z-index: 300;
  width: 46px; height: 46px; border-radius: 13px;
  background: rgba(6,4,5,.92);
  border: 1px solid var(--blue);
  color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 20px rgba(0,0,0,.6), 0 0 0 3px rgba(59,158,255,.15);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none;
  transform: scale(.8);
  transition: opacity .22s ease, transform .22s cubic-bezier(.34,1.56,.64,1), bottom 0.3s ease;
  will-change: opacity, transform;
}
#btn-recenter.show {
  opacity: 1; pointer-events: auto; transform: scale(1);
}
body.navigating #btn-recenter { bottom: calc(16px + var(--safe-b)); }

/* ── STATUS PILL ──────────────────────────────────────────────────────── */
#status-pill {
  position: fixed; top: calc(var(--safe-t) + 14px);
  left: 50%; transform: translateX(-50%) translateY(-4px);
  z-index: 500;
  background: var(--ink-2); border: 1px solid var(--border-r); color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
  padding: 8px 20px; border-radius: 6px;
  pointer-events: none; opacity: 0;
  transition: opacity .22s ease, transform .22s ease;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  will-change: opacity, transform;
}
#status-pill.red   { background: var(--red);    border-color: var(--red-2); box-shadow: 0 4px 24px rgba(227,41,58,.35); }
#status-pill.green { background: var(--green-2); border-color: rgba(0,165,88,.5); box-shadow: 0 4px 24px rgba(0,165,88,.3); }
#status-pill.blue  { background: #2a6abf;        border-color: rgba(59,158,255,.4); box-shadow: 0 4px 24px rgba(59,158,255,.3); }
#status-pill.show  { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── NAV OVERLAY ──────────────────────────────────────────────────────── */
#nav-overlay {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 300;
  background: rgba(6,4,5,.97);
  backdrop-filter: blur(24px) saturate(1.6); -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-t) + 10px) calc(14px + var(--safe-r)) 12px calc(14px + var(--safe-l));
  transform: translateY(-100%);
  transition: transform .32s cubic-bezier(.32,.72,0,1);
  will-change: transform;
  box-shadow: 0 6px 40px rgba(0,0,0,.7);
}
#nav-overlay.active { transform: translateY(0); }

.nav-maneuver-row {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.nav-arrow-box {
  flex-shrink: 0; width: 52px; height: 52px; border-radius: 14px;
  background: var(--blue-soft); border: 1px solid rgba(59,158,255,.25);
  display: flex; align-items: center; justify-content: center;
  transition: background .3s, border-color .3s;
}
.nav-arrow-box.arrival { background: rgba(0,201,110,.10); border-color: rgba(0,201,110,.3); }
.nav-arrow-box.u-turn  { background: rgba(245,166,34,.08); border-color: rgba(245,166,34,.25); }
.nav-arrow-box svg { transition: transform .25s cubic-bezier(.34,1.56,.64,1); color: var(--blue); }
.nav-arrow-box.arrival svg { color: var(--green); }

.nav-inst-col { flex: 1; min-width: 0; }
.nav-inst {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; letter-spacing: .01em;
  color: var(--text); line-height: 1.15;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-street {
  font-size: 12px; color: var(--text-2); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .02em;
}

.nav-meta-row { display: flex; align-items: center; gap: 8px; }
.nav-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-2); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
}
.nav-pill.active { color: var(--blue); border-color: rgba(59,158,255,.25); background: var(--blue-soft); }
.nav-pill.done   { color: var(--green); border-color: rgba(0,201,110,.25); background: rgba(0,201,110,.07); }
#nav-step-dist   { flex: 1; text-align: right; }

.nav-controls { display: flex; gap: 7px; margin-left: auto; flex-shrink: 0; }
.nav-ctrl-btn {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background .15s, color .15s, border-color .15s, transform .1s; flex-shrink: 0;
}
.nav-ctrl-btn:active      { transform: scale(.9); }
.nav-ctrl-btn.end:active  { background: rgba(227,41,58,.15); border-color: var(--red); color: var(--red); }

/* Progress bar */
#nav-progress-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  z-index: 400; background: transparent; display: none;
}
#nav-progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--blue), #7eb8ff);
  transition: width .6s ease;
  box-shadow: 0 0 8px rgba(59,158,255,.7);
}

body.navigating #panel { transform: translateY(100%); pointer-events: none; }

/* ── PANEL ────────────────────────────────────────────────────────────── */
#panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(9,6,7,.93);
  backdrop-filter: blur(22px) saturate(1.4); -webkit-backdrop-filter: blur(22px) saturate(1.4);
  border-top: 1px solid rgba(255,255,255,.085); border-radius: 22px 22px 0 0;
  box-shadow: 0 -2px 0 rgba(255,255,255,.045) inset, 0 -12px 60px rgba(0,0,0,.7);
  display: flex; flex-direction: column; overflow: hidden;
  max-height: 68vh; padding-bottom: var(--safe-b);
  will-change: transform; transition: transform .34s cubic-bezier(.32,.72,0,1);
}
#panel > * { position: relative; z-index: 1; }

#drag-zone { flex-shrink: 0; height: 28px; display: flex; align-items: center; justify-content: center; cursor: grab; user-select: none; touch-action: none; }
#drag-zone:active { cursor: grabbing; }
#drag-pip { width: 38px; height: 4px; background: rgba(255,255,255,.15); border-radius: 2px; transition: background .2s, width .2s; }
#drag-zone:active #drag-pip { background: rgba(255,255,255,.3); width: 48px; }

#header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px 12px; }
#logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; color: var(--text); line-height: 1; user-select: none; }
#logo em  { color: var(--red); font-style: normal; }
#logo sub { display: block; font-size: 9px; font-weight: 500; letter-spacing: .12em; color: var(--text-3); margin-top: 1px; text-transform: uppercase; }

.hbtn { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: background .15s, color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
.hbtn:active { background: rgba(255,255,255,.09); color: var(--text); }

#search-row { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 0 14px 10px; }
#address { flex: 1; height: 50px; background: rgba(255,255,255,.055); border: 1px solid var(--border); border-radius: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 0 14px; outline: none; transition: border-color .15s, background .15s; }
#address:focus { border-color: rgba(227,41,58,.4); background: rgba(255,255,255,.07); }
#btn-pin { flex-shrink: 0; width: 50px; height: 50px; border-radius: 13px; background: rgba(255,255,255,.04); border: 1px solid var(--border); color: var(--text-2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; }
#btn-add { flex-shrink: 0; width: 50px; height: 50px; border-radius: 13px; background: var(--red); border: none; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: transform .12s; }
#btn-add:active { background: var(--red-2); transform: scale(.9); }

#action-strip { flex-shrink: 0; display: flex; gap: 8px; padding: 0 14px 8px; }
#btn-optimize { flex: 2; height: 46px; background: rgba(0,201,110,.09); border: 1px solid rgba(0,201,110,.22); border-radius: 12px; color: var(--green); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: transform .12s; }
#btn-optimize:active { transform: scale(.97); }
.sec-btn { flex: 1; height: 46px; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 12px; color: var(--text-2); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; }

#nav-row { flex-shrink: 0; padding: 0 14px 10px; display: none; }
#btn-nav { width: 100%; height: 50px; background: var(--green); border: none; border-radius: 13px; color: var(--ink); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; }

#stops-outer { flex: 1; min-height: 0; position: relative; overflow: hidden; }
#stops-scroll { height: 100%; overflow-y: auto; overflow-x: hidden; padding: 2px 14px 10px; }
.stop-row { display: flex; align-items: center; gap: 11px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.stop-badge { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; color: #fff; background: linear-gradient(145deg, #e83848, #a81e2c); }
.stop-meta { flex: 1; min-width: 0; }
.stop-name { display: block; font-size: 13px; font-weight: 500; color: var(--text); }
.stop-del { width: 36px; height: 36px; border-radius: 9px; background: none; border: 1px solid transparent; color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
#empty { text-align: center; padding: 20px 0 12px; color: var(--text-3); font-size: 13px; }

/* ── BACKDROP & SHEETS ────────────────────────────────────────────────── */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 400; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(3px); }
.backdrop.on { opacity: 1; pointer-events: auto; }

.sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 500; background: var(--ink-1); border-top: 1px solid var(--border-r); border-radius: 22px 22px 0 0; padding-bottom: var(--safe-b); transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1); }
.sheet.on { transform: translateY(0); }
.sheet-pip { width: 36px; height: 4px; background: var(--ink-4); border-radius: 2px; margin: 14px auto 18px; }
.sheet-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--text); padding: 0 20px 18px; }
</style>
</head>
<body>

<div id="map"></div>
<div id="nav-progress-bar"><div id="nav-progress-fill"></div></div>

<!-- Re-center GPS button -->
<button id="btn-recenter" onclick="reCenterMap()" aria-label="Re-center map on my location">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
  </svg>
</button>

<!-- Navigation HUD -->
<div id="nav-overlay">
  <div class="nav-maneuver-row">
    <div class="nav-arrow-box" id="nav-arrow-box">
      <!-- Up Arrow SVG -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </div>
    <div class="nav-inst-col">
      <div class="nav-inst" id="nav-inst">Proceed to route</div>
      <div class="nav-street" id="nav-street">Starting navigation...</div>
    </div>
  </div>
  <div class="nav-meta-row">
    <div class="nav-pill active" id="nav-step-dist">Calculating...</div>
    <div class="nav-controls">
      <button class="nav-ctrl-btn end" id="btn-end-nav" onclick="stopNavigation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Status Pill -->
<div id="status-pill">Status</div>

<!-- Main Panel -->
<div id="panel">
  <div id="drag-zone"><div id="drag-pip"></div></div>
  
  <div id="header">
    <div id="logo">SRP<em>.</em><sub>Routing Engine</sub></div>
    <button class="hbtn" onclick="toggleRoutesDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>

  <div id="search-row">
    <input type="text" id="address" placeholder="Enter an address or coordinate..." />
    <button id="btn-pin" onclick="togglePinMode()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Pin
    </button>
    <button id="btn-add" onclick="addStop()">Add</button>
  </div>

  <div id="action-strip">
    <button id="btn-optimize" onclick="optimizeRoute()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Optimize
    </button>
    <button class="sec-btn" id="btn-save" onclick="openSaveSheet()">Save</button>
    <button class="sec-btn" id="btn-clear" onclick="clearStops()">Clear</button>
  </div>

  <div id="nav-row">
    <button id="btn-nav" onclick="startNavigation()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start Route
    </button>
  </div>

  <div id="stops-outer">
    <div id="stops-scroll">
      <div id="empty">
        <strong>No Stops Added</strong>
        Search above or pin locations on the map.
      </div>
      <!-- Stops will be injected here -->
    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closeAllSheets()"></div>

<!-- Save Sheet -->
<div class="sheet" id="save-sheet">
  <div class="sheet-pip"></div>
  <div class="sheet-title">Save Route</div>
  <div style="padding: 0 20px 20px; color: var(--text-2);">Route saving functionality goes here.</div>
</div>

<!-- Routes Drawer -->
<div class="sheet" id="routes-drawer">
  <div class="sheet-pip"></div>
  <div class="sheet-title">Saved Routes</div>
  <div style="padding: 0 20px 20px; color: var(--text-2);">Saved routes list goes here.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // --- STATE ---
  let map, routeLine;
  let stops = [];
  let markers = [];
  let isPinMode = false;

  // --- INIT MAP ---
  document.addEventListener('DOMContentLoaded', () => {
    // Default to a central US view
    map = L.map('map', { zoomControl: false }).setView([39.8283, -98.5795], 4);
    
    // Add free OpenStreetMap tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    // Add zoom controls to bottom right
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Click handler for Pin Mode
    map.on('click', function(e) {
      if (isPinMode) {
        document.getElementById('address').value = `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
        togglePinMode(); // Turn off after click
      }
    });

    updatePanelLayout();
  });

  // --- CORE FUNCTIONS ---
  function togglePinMode() {
    isPinMode = !isPinMode;
    const btn = document.getElementById('btn-pin');
    const mapEl = document.getElementById('map');
    
    if (isPinMode) {
      btn.classList.add('active');
      mapEl.classList.add('pin-mode');
      showStatus('Tap map to select location', 'blue');
    } else {
      btn.classList.remove('active');
      mapEl.classList.remove('pin-mode');
    }
  }

  function addStop() {
    const input = document.getElementById('address');
    const val = input.value.trim();
    if (!val) return;

    // Simple mock logic: if it looks like coordinates, use them. Otherwise randomize nearby.
    let lat, lng;
    if (val.includes(',')) {
      const parts = val.split(',');
      lat = parseFloat(parts[0]);
      lng = parseFloat(parts[1]);
    } else {
      // Mock coordinates if user just typed text
      const center = map.getCenter();
      lat = center.lat + (Math.random() - 0.5) * 0.1;
      lng = center.lng + (Math.random() - 0.5) * 0.1;
    }

    const stop = { id: Date.now(), name: val, lat, lng };
    stops.push(stop);
    
    // Add marker to map
    const marker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: 'var(--red)', color: '#fff', weight: 2, fillOpacity: 1
    }).addTo(map);
    markers.push({ id: stop.id, layer: marker });

    input.value = '';
    map.setView([lat, lng], 13);
    renderStops();
    checkNavReady();
  }

  function removeStop(id) {
    stops = stops.filter(s => s.id !== id);
    const markerObj = markers.find(m => m.id === id);
    if (markerObj) {
      map.removeLayer(markerObj.layer);
      markers = markers.filter(m => m.id !== id);
    }
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    renderStops();
    checkNavReady();
  }

  function clearStops() {
    stops = [];
    markers.forEach(m => map.removeLayer(m.layer));
    markers = [];
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    renderStops();
    checkNavReady();
    showStatus('Route cleared', 'red');
  }

  function renderStops() {
    const container = document.getElementById('stops-scroll');
    if (stops.length === 0) {
      container.innerHTML = `<div id="empty"><strong>No Stops Added</strong>Search above or pin locations on the map.</div>`;
      return;
    }

    container.innerHTML = stops.map((stop, i) => `
      <div class="stop-row">
        <div class="stop-badge">${i + 1}</div>
        <div class="stop-meta">
          <span class="stop-name">${stop.name}</span>
        </div>
        <button class="stop-del" onclick="removeStop(${stop.id})">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    `).join('');
  }

  function checkNavReady() {
    const navRow = document.getElementById('nav-row');
    if (stops.length >= 2) {
      navRow.style.display = 'block';
    } else {
      navRow.style.display = 'none';
    }
    updatePanelLayout();
  }

  function optimizeRoute() {
    if (stops.length < 2) {
      showStatus('Need at least 2 stops', 'red');
      return;
    }
    showStatus('Optimizing Route...', 'green');
    
    // Draw a mock line between stops
    if (routeLine) map.removeLayer(routeLine);
    const latlngs = stops.map(s => [s.lat, s.lng]);
    routeLine = L.polyline(latlngs, { color: 'var(--blue)', weight: 4, opacity: 0.8 }).addTo(map);
    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
  }

  // --- NAVIGATION MODE ---
  function startNavigation() {
    if (stops.length < 2) return;
    document.body.classList.add('navigating');
    document.getElementById('nav-overlay').classList.add('active');
    document.getElementById('nav-progress-bar').style.display = 'block';
    document.getElementById('btn-recenter').classList.add('show');
    showStatus('Navigation Started', 'blue');
    
    // Mock progress bar animation
    setTimeout(() => { document.getElementById('nav-progress-fill').style.width = '30%'; }, 500);
  }

  function stopNavigation() {
    document.body.classList.remove('navigating');
    document.getElementById('nav-overlay').classList.remove('active');
    document.getElementById('nav-progress-bar').style.display = 'none';
    document.getElementById('nav-progress-fill').style.width = '0%';
    document.getElementById('btn-recenter').classList.remove('show');
  }

  function reCenterMap() {
    if (stops.length > 0) {
      map.setView([stops[0].lat, stops[0].lng], 15);
    }
  }

  // --- UTILS & UI ---
  function showStatus(text, colorClass) {
    const pill = document.getElementById('status-pill');
    pill.textContent = text;
    pill.className = `show ${colorClass}`;
    setTimeout(() => pill.classList.remove('show'), 3000);
  }

  function updatePanelLayout() {
    const panel = document.getElementById('panel');
    document.documentElement.style.setProperty('--panel-visible', `${panel.offsetHeight}px`);
  }

  function openSaveSheet() {
    document.getElementById('backdrop').classList.add('on');
    document.getElementById('save-sheet').classList.add('on');
  }

  function toggleRoutesDrawer() {
    document.getElementById('backdrop').classList.add('on');
    document.getElementById('routes-drawer').classList.add('on');
  }

  function closeAllSheets() {
    document.getElementById('backdrop').classList.remove('on');
    document.querySelectorAll('.sheet').forEach(s => s.classList.remove('on'));
  }

  // Update layout variable on window resize
  window.addEventListener('resize', updatePanelLayout);

</script>
</body>
</html>
