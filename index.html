
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Route Planner" />
  <title>Simple Route Planner</title>
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/png;base64,{b64}">
  <link rel="icon" type="image/png" href="data:image/png;base64,{b64}">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>


  <style>
    :root {
      --red:      #e8293a;
      --red-dim:  #b01e2b;
      --red-soft: rgba(232,41,58,.10);
      --bg:       #0f0a0a;
      --surface:  #170d0d;
      --raised:   #201212;
      --raised2:  #2a1717;
      --border:   rgba(255,255,255,.07);
      --border-r: rgba(232,41,58,.2);
      --text:     #f5f0f0;
      --muted:    #6b5555;
      --radius:   12px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ── MAP ─────────────────────────────────────────── */
    #map-wrap { position: relative; flex: 1 1 0; min-height: 0; }
    #map { height: 100%; width: 100%; }

    .leaflet-control-attribution {
      background: rgba(0,0,0,.55) !important; color: rgba(255,255,255,.3) !important;
      font-size: 9px !important; backdrop-filter: blur(4px);
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,.35) !important; }
    .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 12px rgba(0,0,0,.5) !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important; color: var(--text) !important;
      border-color: var(--border) !important;
      font-size: 18px !important; width: 38px !important; height: 38px !important; line-height: 38px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--raised2) !important; color: var(--red) !important; }
    #map.pin-mode { outline: 2.5px solid var(--red); outline-offset: -2px; }

    #status-pill {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%) translateY(-6px); z-index: 900;
      background: var(--red); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      padding: 7px 18px; border-radius: 4px; pointer-events: none; opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      white-space: nowrap; box-shadow: 0 4px 20px rgba(232,41,58,.4);
    }
    #status-pill.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PANEL ───────────────────────────────────────── */
    #panel {
      flex: 0 0 auto; background: var(--surface); border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding-bottom: var(--safe-b); max-height: 52vh;
    }
    #drag-handle {
      width: 36px; height: 4px; background: var(--raised2);
      border-radius: 2px; margin: 10px auto 6px; flex-shrink: 0;
    }

    /* ── HEADER ──────────────────────────────────────── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px 10px; flex-shrink: 0;
    }
    #app-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
      color: var(--text); line-height: 1;
    }
    #app-name span { color: var(--red); }

    .hdr-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--raised); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); position: relative;
      transition: color .15s, background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .hdr-btn:active { background: var(--raised2); color: var(--red); }
    .hdr-btn.active { color: var(--red); border-color: var(--border-r); background: var(--red-soft); }

    .hdr-badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 16px; height: 16px;
      background: var(--red); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
      border-radius: 8px; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; transform: scale(0);
      transition: opacity .2s, transform .2s;
    }
    .hdr-badge.show { opacity: 1; transform: scale(1); }

    /* ── INPUT ROW ───────────────────────────────────── */
    #input-row { display: flex; gap: 8px; padding: 0 16px 10px; flex-shrink: 0; }

    #address {
      flex: 1; background: var(--raised); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 0 14px; height: 48px; outline: none;
      transition: border-color .15s, background .15s; -webkit-appearance: none;
    }
    #address::placeholder { color: var(--muted); }
    #address:focus { border-color: var(--red); background: var(--raised2); }

    #btn-add {
      height: 48px; padding: 0 20px; background: var(--red); color: #fff; border: none;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-add:active { background: var(--red-dim); transform: scale(.96); }

    /* ── ACTION ROW ──────────────────────────────────── */
    #action-row { display: flex; gap: 8px; padding: 0 16px 8px; flex-shrink: 0; }

    .action-btn {
      flex: 1; height: 44px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--raised); color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s, border-color .15s, color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent; -webkit-appearance: none;
    }
    .action-btn:active { transform: scale(.96); }

    #btn-pin.active, #btn-pin:active { background: var(--red-soft); border-color: var(--red); color: var(--red); }
    #btn-optimize:active { background: rgba(0,200,100,.08); border-color: rgba(0,200,100,.4); color: #00c864; }
    #btn-save-route:active { background: rgba(255,180,0,.08); border-color: rgba(255,180,0,.4); color: #ffb400; }
    #btn-save-route.has-stops { color: var(--text); border-color: rgba(255,180,0,.25); }
    #btn-clear:active { background: rgba(255,100,80,.08); border-color: rgba(255,100,80,.4); color: #ff6450; }

    /* ── APPLE MAPS ROW ──────────────────────────────── */
    #maps-row {
      padding: 0 16px 10px; flex-shrink: 0;
      display: none;
    }
    #btn-apple-maps {
      width: 100%; height: 48px;
      background: linear-gradient(135deg, #1a4a7a 0%, #1a6eb5 100%);
      border: 1px solid rgba(26,110,181,.4);
      border-radius: var(--radius); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: opacity .15s, transform .1s, filter .15s;
      -webkit-tap-highlight-color: transparent; -webkit-appearance: none;
      box-shadow: 0 2px 14px rgba(26,110,181,.25);
    }
    #btn-apple-maps:active { transform: scale(.97); filter: brightness(.9); }
    #btn-apple-maps .maps-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      background: #fff; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-apple-maps .maps-icon svg { display: block; }

    #start-banner {
      margin: 0 16px 8px;
      background: rgba(255, 180, 0, .08);
      border: 1px solid rgba(255, 180, 0, .22);
      border-radius: 10px;
      padding: 9px 13px;
      display: none;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #start-banner.show { display: flex; }
    #start-banner svg { color: #ffb400; flex-shrink: 0; }
    #start-banner-text {
      flex: 1; min-width: 0;
      font-size: 12px; color: rgba(255,180,0,.85); line-height: 1.4;
    }
    #start-banner-text strong { display: block; font-size: 12px; font-weight: 600; margin-bottom: 1px; color: #ffb400; }
    #btn-use-gps {
      flex-shrink: 0; padding: 5px 10px;
      background: var(--raised2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    #btn-use-gps:active { background: var(--red-soft); border-color: var(--red); color: var(--red); }

    /* ── STOPS LIST ──────────────────────────────────── */
    #stops-outer { flex: 1; min-height: 0; position: relative; }

    #stops-wrap {
      height: 100%; overflow-y: auto; overflow-x: hidden;
      padding: 2px 16px 8px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    #stops-wrap::-webkit-scrollbar { display: none; }

    #stops-outer::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
      background: linear-gradient(to bottom, transparent, var(--surface));
      pointer-events: none; opacity: 0; transition: opacity .2s;
    }
    #stops-outer.overflows::after { opacity: 1; }

    #stops-label {
      display: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); padding: 4px 0 8px;
      align-items: center; gap: 8px;
    }
    #stops-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .stop-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      animation: slideUp .18s ease;
    }
    .stop-item:last-child { border-bottom: none; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stop-num {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--red); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s;
    }
    .stop-num.pending {
      background: var(--raised2); border: 1px solid var(--border);
      color: var(--muted); font-size: 18px;
    }

    .stop-meta { flex: 1; min-width: 0; }
    .stop-addr {
      display: block; font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35;
    }
    .stop-addr.loading { color: var(--muted); font-style: italic; }
    .stop-coord { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }

    .stop-remove {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid transparent; background: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .stop-remove:active { background: rgba(232,41,58,.12); border-color: rgba(232,41,58,.3); color: var(--red); }

    #empty-state {
      text-align: center; padding: 16px 0 8px; color: var(--muted); font-size: 13px; line-height: 1.7;
    }
    #empty-state strong {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; letter-spacing: .07em; text-transform: uppercase;
      color: var(--raised2); margin-bottom: 2px;
    }

    /* ── CUSTOM PIN ──────────────────────────────────── */
    .rr-pin { position: relative; width: 30px; height: 38px; }
    .rr-pin-body {
      position: absolute; inset: 0; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg); box-shadow: 0 4px 14px rgba(0,0,0,.55);
    }
    .rr-pin-num {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      padding-bottom: 4px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: #fff; z-index: 1;
    }

    /* ── BACKDROP ────────────────────────────────────── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 1000;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease; backdrop-filter: blur(2px);
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    /* ── SAVE MODAL ──────────────────────────────────── */
    #save-modal {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: var(--surface); border-top: 1px solid var(--border-r);
      border-radius: 20px 20px 0 0; padding: 0 20px calc(20px + var(--safe-b));
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    }
    #save-modal.open { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--raised2); border-radius: 2px; margin: 14px auto 18px; }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;
      color: var(--text); margin-bottom: 4px;
    }
    .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
    .modal-input {
      width: 100%; background: var(--raised); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 0 14px; height: 50px; outline: none;
      transition: border-color .15s, background .15s; -webkit-appearance: none; margin-bottom: 14px;
    }
    .modal-input::placeholder { color: var(--muted); }
    .modal-input:focus { border-color: var(--red); background: var(--raised2); }

    .modal-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      margin-bottom: 16px; gap: 12px;
    }
    .modal-toggle-label { flex: 1; }
    .modal-toggle-label span {
      display: block; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3;
    }
    .modal-toggle-label small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    .ios-toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .ios-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .ios-toggle-track {
      position: absolute; inset: 0; border-radius: 13px;
      background: var(--raised2); border: 1px solid var(--border);
      transition: background .2s, border-color .2s;
      cursor: pointer;
    }
    .ios-toggle-track::after {
      content: ''; position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--muted); top: 2px; left: 2px;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), background .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .ios-toggle input:checked + .ios-toggle-track {
      background: var(--red); border-color: var(--red-dim);
    }
    .ios-toggle input:checked + .ios-toggle-track::after {
      transform: translateX(18px); background: #fff;
    }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btn-cancel {
      flex: 1; height: 50px; background: var(--raised); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background .15s, transform .1s;
    }
    .modal-btn-cancel:active { background: var(--raised2); transform: scale(.97); }
    .modal-btn-confirm {
      flex: 2; height: 50px; background: var(--red); border: none;
      border-radius: var(--radius); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background .15s, transform .1s;
    }
    .modal-btn-confirm:active { background: var(--red-dim); transform: scale(.97); }

    /* ── ROUTES DRAWER ───────────────────────────────── */
    #routes-drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: var(--surface); border-top: 1px solid var(--border-r);
      border-radius: 20px 20px 0 0; max-height: 82vh;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: var(--safe-b);
    }
    #routes-drawer.open { transform: translateY(0); }
    .drawer-handle { width: 36px; height: 4px; background: var(--raised2); border-radius: 2px; margin: 14px auto 0; flex-shrink: 0; }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .drawer-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; color: var(--text); }
    .drawer-title span { color: var(--red); }
    .drawer-close {
      width: 34px; height: 34px; border-radius: 8px; background: var(--raised); border: 1px solid var(--border);
      color: var(--muted); display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s, color .15s;
    }
    .drawer-close:active { background: var(--raised2); color: var(--red); }
    .drawer-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 8px 20px 12px;
    }
    .drawer-list::-webkit-scrollbar { display: none; }

    .drawer-empty { text-align: center; padding: 32px 0 16px; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .drawer-empty strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: .07em; text-transform: uppercase; color: var(--raised2); margin-bottom: 4px; }

    .route-card { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; animation: slideUp .18s ease; }
    .route-card:last-child { border-bottom: none; }
    .route-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--red-soft); border: 1px solid var(--border-r); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--red); }
    .route-info { flex: 1; min-width: 0; }
    .route-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .route-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .route-start-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(255,180,0,.1); border: 1px solid rgba(255,180,0,.2);
      border-radius: 4px; padding: 1px 6px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; color: #ffb400;
    }
    .route-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .route-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--raised); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s, color .15s, border-color .15s, transform .1s; }
    .route-btn:active { transform: scale(.93); }
    .route-btn.load:active { background: var(--red-soft); border-color: var(--red); color: var(--red); }
    .route-btn.del:active { background: rgba(255,100,80,.1); border-color: rgba(255,100,80,.3); color: #ff6450; }
    .route-confirm { display: none; width: 100%; gap: 8px; padding: 8px 0 2px; align-items: center; }
    .route-card.confirming .route-confirm { display: flex; }
    .route-confirm span { flex: 1; font-size: 12px; color: var(--muted); }
    .route-confirm-yes { padding: 6px 14px; background: rgba(255,100,80,.12); border: 1px solid rgba(255,100,80,.35); border-radius: 8px; color: #ff6450; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .route-confirm-no { padding: 6px 14px; background: var(--raised); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>



<div id="map-wrap">
  <div id="status-pill"></div>
  <div id="map"></div>
</div>

<div id="panel">
  <div id="drag-handle"></div>

  <div id="header">
    <div id="app-name">Simple <span>Route</span> Planner</div>
    <div style="display:flex;gap:8px">
      <button id="btn-routes" class="hdr-btn" onclick="openRoutesDrawer()" title="Saved routes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span id="routes-badge" class="hdr-badge">0</span>
      </button>
      <button id="btn-night" class="hdr-btn active" onclick="toggleNightMode()" title="Night mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div id="start-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div id="start-banner-text">
      <strong>Using Saved Start Location</strong>
      This route has a fixed start point.
    </div>
    <button id="btn-use-gps" onclick="switchToGPS()">Use GPS</button>
  </div>

  <div id="input-row">
    <input id="address" type="text" inputmode="search" placeholder="Search address…"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           onkeydown="if(event.key==='Enter'){this.blur();addStop()}" />
    <button id="btn-add" onclick="addStop()">Add</button>
  </div>

  <div id="action-row">
    <button id="btn-pin" class="action-btn" onclick="togglePinMode()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
      Tap Map
    </button>
    <button id="btn-optimize" class="action-btn" onclick="optimizeRoute()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Optimize
    </button>
    <button id="btn-save-route" class="action-btn" onclick="openSaveModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button id="btn-clear" class="action-btn" onclick="clearAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Clear
    </button>
  </div>

  <div id="maps-row">
    <button id="btn-apple-maps" onclick="openInMaps()">
      <div class="maps-icon">
        <svg width="12" height="14" viewBox="0 0 12 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 0C3.24 0 1 2.24 1 5c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 6.5A1.5 1.5 0 1 1 6 3.5 1.5 1.5 0 0 1 6 6.5z" fill="#1a6eb5"/>
        </svg>
      </div>
      Open in Apple Maps — Optimized Order
    </button>
  </div>

  <div id="stops-outer">
    <div id="stops-wrap">
      <div id="stops-label">Stops</div>
      <div id="stops"></div>
      <div id="empty-state"><strong>No stops added</strong>Search an address or tap the map</div>
    </div>
  </div>
</div>

<div id="backdrop" class="sheet-backdrop" onclick="closeAll()"></div>

<div id="save-modal">
  <div class="modal-handle"></div>
  <div class="modal-title">Save Route</div>
  <div class="modal-sub" id="save-modal-sub">Name this route to access it later</div>
  <input id="route-name-input" class="modal-input" type="text" inputmode="text"
         placeholder="e.g. Morning deliveries…"
         autocomplete="off" autocorrect="off" spellcheck="false" maxlength="48"
         onkeydown="if(event.key==='Enter'){this.blur();confirmSaveRoute()}" />

  <div class="modal-toggle-row">
    <div class="modal-toggle-label">
      <span>Save start location</span>
      <small>Resume from this exact starting point later</small>
    </div>
    <label class="ios-toggle">
      <input type="checkbox" id="save-start-toggle" />
      <span class="ios-toggle-track"></span>
    </label>
  </div>

  <div class="modal-btns">
    <button class="modal-btn-cancel" onclick="closeSaveModal()">Cancel</button>
    <button class="modal-btn-confirm" onclick="confirmSaveRoute()">Save Route</button>
  </div>
</div>

<div id="routes-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">Saved <span>Routes</span></div>
    <button class="drawer-close" onclick="closeRoutesDrawer()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-list" id="drawer-list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let start           = null;
  let savedStartCoord = null;
  let stops           = [];
  let markers         = [];
  let routeLine       = null;
  let darkMode        = true;
  let pinMode         = false;
  let optimizeGen     = 0;

  const map = L.map("map", { tap: false, zoomControl: true, attributionControl: true })
    .setView([37.7749, -122.4194], 12);
  map.zoomControl.setPosition("bottomright");

  const lightTiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { maxZoom: 19, attribution: "© OpenStreetMap" });
  const darkTiles  = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { maxZoom: 19, attribution: "© OpenStreetMap © CARTO" });
  darkTiles.addTo(map);

  function makePin(label, bg, textColor) {
    return L.divIcon({
      className: "",
      html: `<div class="rr-pin">
               <div class="rr-pin-body" style="background:${bg||"#e8293a"}"></div>
               <div class="rr-pin-num" style="color:${textColor||"#fff"}">${label}</div>
             </div>`,
      iconSize: [30,38], iconAnchor: [15,38], popupAnchor: [0,-40]
    });
  }

  let pillTimer = null;
  function showPill(txt, ms) {
    clearTimeout(pillTimer);
    const p = document.getElementById("status-pill");
    p.textContent = txt; p.classList.add("show");
    if (ms) pillTimer = setTimeout(hidePill, ms);
  }
  function hidePill() { document.getElementById("status-pill").classList.remove("show"); }

  function togglePinMode() {
    pinMode = !pinMode;
    document.getElementById("btn-pin").classList.toggle("active", pinMode);
    document.getElementById("map").classList.toggle("pin-mode", pinMode);
    if (pinMode) {
      showPill("Tap map to place stop");
      map.dragging.disable(); map.touchZoom.disable();
      map.doubleClickZoom.disable(); map.scrollWheelZoom.disable();
    } else {
      hidePill();
      map.dragging.enable(); map.touchZoom.enable();
      map.doubleClickZoom.enable(); map.scrollWheelZoom.enable();
    }
  }

  map.on("click", e => {
    if (!pinMode) return;
    if (navigator.vibrate) navigator.vibrate(25);
    pushStop([e.latlng.lat, e.latlng.lng], null);
    optimizeRoute();
  });

  let holdTimer = null;
  map.on("mousedown", e => {
    if (pinMode) return;
    holdTimer = setTimeout(() => { pushStop([e.latlng.lat, e.latlng.lng], null); optimizeRoute(); }, 500);
  });
  map.on("mouseup mouseleave", () => clearTimeout(holdTimer));

  let gpsWatcher = null;

  function startGPS() {
    if (gpsWatcher !== null) return;
    gpsWatcher = navigator.geolocation.watchPosition(
      pos => {
        if (savedStartCoord) return;
        const coord = [pos.coords.latitude, pos.coords.longitude];
        const isFirst = !start;
        start = coord;
        if (isFirst) {
          map.setView(start, 14);
          L.marker(start, { icon: makePin("●", "#ff9500", "#fff") })
            .addTo(map).bindPopup("<b>You are here</b>");
        }
      },
      () => alert("Location access is required to plan routes."),
      { enableHighAccuracy: true }
    );
  }

  startGPS();

  function switchToGPS() {
    savedStartCoord = null;
    document.getElementById("start-banner").classList.remove("show");
    if (gpsWatcher !== null) {
      navigator.geolocation.clearWatch(gpsWatcher);
      gpsWatcher = null;
    }
    start = null;
    startGPS();
    showPill("Switched to live GPS", 2000);
    if (stops.length > 0) optimizeRoute();
  }

  async function reverseGeocode(lat, lng) {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
        { headers: { Accept: "application/json" } }
      ).then(r => r.json());
      const a = r.address || {};
      const num  = a.house_number || "";
      const road = a.road || a.pedestrian || a.cycleway || a.path || "";
      const city = a.city || a.town || a.village || a.suburb || a.neighbourhood || "";
      if (road && city) return `${num ? num+" ":""}${road}, ${city}`;
      if (road)         return `${num ? num+" ":""}${road}`;
      if (r.display_name) return r.display_name.split(",").slice(0,2).join(",").trim();
    } catch {}
    return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }

  async function geocode(query) {
    if (!start) throw new Error("No start");
    const [lat, lon] = start;
    const vb = [lon-.25, lat-.25, lon+.25, lat+.25].join(",");
    const r1 = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&viewbox=${vb}&bounded=1`,
      { headers: { Accept: "application/json" } }
    ).then(r => r.json());
    if (r1.length) return { coord: [+r1[0].lat, +r1[0].lon], display: r1[0].display_name };
    const r2 = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
    ).then(r => r.json());
    if (!r2.length) throw new Error("Not found");
    return { coord: [+r2[0].lat, +r2[0].lon], display: r2[0].display_name };
  }

  function shortenAddress(display) {
    const parts = display.split(",").map(s => s.trim())
      .filter(p => p.length > 1 && !/^\d{4,}$/.test(p));
    return parts.slice(0, 2).join(", ");
  }

  async function addStop() {
    const input = document.getElementById("address");
    const btn   = document.getElementById("btn-add");
    const val   = input.value.trim();
    if (!val || !start) return;
    btn.textContent = "…"; btn.style.opacity = ".55";
    try {
      const { coord, display } = await geocode(val);
      pushStop(coord, shortenAddress(display));
      input.value = "";
      optimizeRoute();
    } catch {
      input.style.borderColor = "#e8293a";
      input.style.background  = "rgba(232,41,58,.08)";
      setTimeout(() => { input.style.borderColor = ""; input.style.background = ""; }, 1400);
    } finally {
      btn.textContent = "Add"; btn.style.opacity = "";
    }
  }

  async function pushStop(coord, knownAddress) {
    const stopObj = { coord, address: knownAddress || "Locating…", routePos: 0 };
    stops.push(stopObj);

    const m = L.marker(coord, { icon: makePin("·", "#3a1a1a", "#aaa") })
      .addTo(map).bindPopup(stopObj.address);
    markers.push(m);

    document.getElementById("empty-state").style.display = "none";
    updateSaveBtn(); updateMapsRow(); renderStops();

    if (!knownAddress) {
      const addr = await reverseGeocode(coord[0], coord[1]);
      stopObj.address = addr;
      m.setPopupContent(addr);
      renderStops();
    }
  }

  function removeStop(idx) {
    map.removeLayer(markers[idx]);
    markers.splice(idx, 1);
    stops.splice(idx, 1);
    if (stops.length === 0) {
      clearPolyline();
      document.getElementById("empty-state").style.display = "";
    } else {
      stops.forEach(s => s.routePos = 0);
      optimizeRoute();
    }
    updateSaveBtn(); updateMapsRow(); renderStops();
  }

  function renderStops() {
    const isOptimized = stops.some(s => s.routePos > 0);
    const items = stops.map((s, i) => ({ ...s, _i: i }));
    if (isOptimized) items.sort((a, b) => a.routePos - b.routePos);

    const lbl = document.getElementById("stops-label");
    lbl.style.display = stops.length ? "flex" : "none";
    lbl.textContent   = isOptimized ? "Optimized Order" : "Stops";

    document.getElementById("stops").innerHTML = items.map(s => `
      <div class="stop-item">
        <div class="stop-num${s.routePos ? "" : " pending"}">${s.routePos || "·"}</div>
        <div class="stop-meta">
          <span class="stop-addr${s.address === "Locating…" ? " loading" : ""}">${escHtml(s.address)}</span>
          <span class="stop-coord">${s.coord[0].toFixed(4)}, ${s.coord[1].toFixed(4)}</span>
        </div>
        <button class="stop-remove" onclick="removeStop(${s._i})" aria-label="Remove stop">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>`).join("");

    const wrap = document.getElementById("stops-wrap");
    document.getElementById("stops-outer")
      .classList.toggle("overflows", wrap.scrollHeight > wrap.clientHeight + 4);
  }

  function clearPolyline() {
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  }

  function clearAll() {
    optimizeGen++;
    clearPolyline();
    markers.forEach(m => map.removeLayer(m));
    markers = []; stops = [];
    document.getElementById("stops").innerHTML = "";
    document.getElementById("empty-state").style.display = "";
    document.getElementById("stops-label").style.display  = "none";
    document.getElementById("stops-outer").classList.remove("overflows");
    updateSaveBtn(); updateMapsRow();
  }

  async function optimizeRoute() {
    if (!start || stops.length === 0) return;
    const myGen = optimizeGen;
    clearPolyline();

    const coords = [start, ...stops.map(s => s.coord)].map(c => `${c[1]},${c[0]}`).join(";");
    try {
      const data = await fetch(
        `https://router.project-osrm.org/trip/v1/driving/${coords}?source=first&roundtrip=false&geometries=geojson`
      ).then(r => r.json());

      if (optimizeGen !== myGen) return;
      if (!data.trips) return;

      stops.forEach((s, i) => { s.routePos = data.waypoints[i + 1].waypoint_index; });
      const minPos = Math.min(...stops.map(s => s.routePos));
      stops.forEach(s => s.routePos = s.routePos - minPos + 1);

      markers.forEach((m, i) => m.setIcon(makePin(stops[i].routePos, "#e8293a", "#fff")));
      renderStops(); updateMapsRow();

      const pts = data.trips[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(pts, { color:"#e8293a", weight:4.5, opacity:.9, lineCap:"round", lineJoin:"round" }).addTo(map);
      map.fitBounds(routeLine.getBounds(), { padding: [28,28] });
    } catch(err) { console.error(err); }
  }

  function toggleNightMode() {
    darkMode = !darkMode;
    document.getElementById("btn-night").classList.toggle("active", darkMode);
    if (darkMode) { map.removeLayer(lightTiles); darkTiles.addTo(map); }
    else          { map.removeLayer(darkTiles);  lightTiles.addTo(map); }
    if (stops.length > 0) optimizeRoute();
  }

  function updateSaveBtn() {
    document.getElementById("btn-save-route").classList.toggle("has-stops", stops.length > 0);
  }

  function updateMapsRow() {
    document.getElementById("maps-row").style.display = stops.length > 0 ? "block" : "none";
  }

  function openInMaps() {
    if (!stops.length) { showPill("Add stops first", 1800); return; }

    const sortedStops = [...stops].sort((a, b) => a.routePos - b.routePos);

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isIOS) {
      let url = "maps://?";
      if (start) {
        url += `saddr=${start[0]},${start[1]}`;
        const daddrs = sortedStops.map(s => `${s.coord[0]},${s.coord[1]}`).join("&daddr=");
        url += `&daddr=${daddrs}`;
      } else {
        const [first, ...rest] = sortedStops;
        url += `saddr=${first.coord[0]},${first.coord[1]}`;
        if (rest.length > 0) {
          const daddrs = rest.map(s => `${s.coord[0]},${s.coord[1]}`).join("&daddr=");
          url += `&daddr=${daddrs}`;
        }
      }
      url += "&dirflg=d";
      window.location.href = url;
    } else {
      const waypointCoords = sortedStops.map(s => `${s.coord[0]},${s.coord[1]}`);
      let gmUrl;
      if (start) {
        const origin = `${start[0]},${start[1]}`;
        const dest   = waypointCoords[waypointCoords.length - 1];
        const wps    = waypointCoords.slice(0, -1).join("|");
        gmUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}` +
                (wps ? `&waypoints=${encodeURIComponent(wps)}` : "") + "&travelmode=driving";
      } else {
        const dest = waypointCoords[waypointCoords.length - 1];
        const wps  = waypointCoords.slice(0, -1).join("|");
        gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${dest}` +
                (wps ? `&waypoints=${encodeURIComponent(wps)}` : "") + "&travelmode=driving";
      }
      window.open(gmUrl, "_blank");
    }
  }

  const LS_KEY = "rr_saved_routes_v3";
  function loadSavedRoutes() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; } }
  function persistRoutes(r)  { localStorage.setItem(LS_KEY, JSON.stringify(r)); }

  function refreshBadge() {
    const n = loadSavedRoutes().length;
    const badge = document.getElementById("routes-badge");
    badge.textContent = n;
    badge.classList.toggle("show", n > 0);
  }

  function openSaveModal() {
    if (!stops.length) { showPill("Add stops first", 1800); return; }
    document.getElementById("save-modal-sub").textContent =
      `${stops.length} stop${stops.length !== 1 ? "s" : ""} will be saved`;
    const inp = document.getElementById("route-name-input");
    inp.value = "";
    document.getElementById("save-start-toggle").checked = false;
    document.getElementById("backdrop").classList.add("open");
    document.getElementById("save-modal").classList.add("open");
    setTimeout(() => inp.focus(), 350);
  }
  function closeSaveModal() {
    document.getElementById("backdrop").classList.remove("open");
    document.getElementById("save-modal").classList.remove("open");
    document.getElementById("route-name-input").blur();
  }
  function confirmSaveRoute() {
    const inp  = document.getElementById("route-name-input");
    const name = inp.value.trim();
    if (!name) {
      inp.style.borderColor = "#e8293a"; inp.style.background = "rgba(232,41,58,.08)";
      setTimeout(() => { inp.style.borderColor = ""; inp.style.background = ""; }, 1200);
      return;
    }
    const saveStart = document.getElementById("save-start-toggle").checked;
    const routes = loadSavedRoutes();
    routes.unshift({
      id: Date.now(), name,
      stops: stops.map(s => ({ coord: s.coord, address: s.address })),
      savedStart: saveStart && start ? start : null,
      savedAt: new Date().toISOString()
    });
    persistRoutes(routes); refreshBadge();
    closeSaveModal();
    showPill(saveStart ? "Route + start location saved ✓" : "Route saved ✓", 2000);
  }

  function openRoutesDrawer()  { renderDrawerList(); document.getElementById("backdrop").classList.add("open"); document.getElementById("routes-drawer").classList.add("open"); }
  function closeRoutesDrawer() { document.getElementById("backdrop").classList.remove("open"); document.getElementById("routes-drawer").classList.remove("open"); }
  function closeAll()          { closeSaveModal(); closeRoutesDrawer(); }

  function renderDrawerList() {
    const routes = loadSavedRoutes();
    const listEl = document.getElementById("drawer-list");
    if (!routes.length) {
      listEl.innerHTML = `<div class="drawer-empty"><strong>No saved routes</strong>Build a route and tap Save</div>`;
      return;
    }
    listEl.innerHTML = routes.map(r => {
      const date  = new Date(r.savedAt).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
      const cnt   = r.stops.length;
      const badge = r.savedStart
        ? `<span class="route-start-badge">
             <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
             Fixed start
           </span>`
        : "";
      return `<div class="route-card" id="rc-${r.id}">
        <div class="route-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="route-info">
          <div class="route-name">${escHtml(r.name)}</div>
          <div class="route-meta">${cnt} stop${cnt!==1?"s":""} · ${date} ${badge}</div>
        </div>
        <div class="route-actions">
          <button class="route-btn load" onclick="loadRoute(${r.id})" title="Load route">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          </button>
          <button class="route-btn del" onclick="askDeleteRoute(${r.id})" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
        <div class="route-confirm">
          <span>Delete "${escHtml(r.name)}"?</span>
          <button class="route-confirm-no"  onclick="cancelDelete(${r.id})">Keep</button>
          <button class="route-confirm-yes" onclick="confirmDelete(${r.id})">Delete</button>
        </div>
      </div>`;
    }).join("");
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function loadRoute(id) {
    const route = loadSavedRoutes().find(r => r.id === id);
    if (!route) return;

    clearAll();
    closeRoutesDrawer();

    if (route.savedStart) {
      savedStartCoord = route.savedStart;
      start = route.savedStart;
      map.setView(start, 14);
      L.marker(start, { icon: makePin("S", "#ffb400", "#fff") })
        .addTo(map).bindPopup("<b>Saved start point</b>");
      document.getElementById("start-banner").classList.add("show");
    } else {
      savedStartCoord = null;
      document.getElementById("start-banner").classList.remove("show");
    }

    for (const s of route.stops) await pushStop(s.coord, s.address);
    optimizeRoute();

    const startNote = route.savedStart ? " (saved start)" : "";
    showPill(`Loaded: ${route.name}${startNote}`, 2400);
  }

  function askDeleteRoute(id) {
    document.querySelectorAll(".route-card.confirming").forEach(el => el.classList.remove("confirming"));
    document.getElementById(`rc-${id}`)?.classList.add("confirming");
  }
  function cancelDelete(id)  { document.getElementById(`rc-${id}`)?.classList.remove("confirming"); }
  function confirmDelete(id) { persistRoutes(loadSavedRoutes().filter(r => r.id !== id)); refreshBadge(); renderDrawerList(); }

  refreshBadge();

  document.getElementById("stops-wrap").addEventListener("touchmove", e => {
    e.stopPropagation();
  }, { passive: true });

  document.getElementById("map").addEventListener("touchmove", e => {
    if (!pinMode) return;
    e.preventDefault();
  }, { passive: false });
</script>
</body>
</html>
