<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Simple Route Runner</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root {
      --blue:#007aff;
      --bg:#f2f2f7;
      --card:#ffffff;
      --text:#1c1c1e;
      --sub:#6c6c70;
      --danger:#ff3b30;
      --green:#34c759;
    }

    body.dark {
      --bg:#0f0f14;
      --card:#1c1c1e;
      --text:#f2f2f7;
      --sub:#a1a1a6;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
      background:var(--bg);color:var(--text);
    }

    #map{height:55vh;transition:outline .15s}
    #map.pin-mode{
      outline:4px solid var(--green);
      cursor:crosshair;
    }

    #panel{padding:14px}

    .card{
      background:var(--card);
      border-radius:16px;
      padding:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.15)
    }

    h1{margin:0 0 6px;font-size:20px}
    .subtitle{color:var(--sub);font-size:14px;margin-bottom:12px}

    input,button{
      width:100%;padding:14px;font-size:16px;
      border-radius:14px;border:none;margin-bottom:10px
    }

    input{border:1px solid #ccc}

    button{background:var(--blue);color:white;font-weight:600;cursor:pointer}
    button.secondary{background:var(--green)}
    button.danger{background:var(--danger)}
    button.ghost{background:none;color:var(--text);border:1px solid #ccc}
    button.pin-active{
      background:var(--green);color:#fff;
      box-shadow:0 0 0 3px rgba(52,199,89,.35);
    }
    button:active{transform:scale(.97)}

    .stop{
      display:flex;align-items:center;gap:10px;
      padding:10px 0;border-bottom:1px solid #eee
    }
    .stop:last-child{border-bottom:none}

    .stop-badge{
      min-width:28px;height:28px;
      border-radius:50%;
      background:var(--blue);
      color:#fff;
      font-size:13px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .stop-label{flex:1;font-size:15px}
    .remove{
      background:none;border:none;color:var(--danger);
      font-size:18px;padding:0;width:auto;margin:0;cursor:pointer;
    }

    #pin-banner{
      display:none;
      position:absolute;
      top:10px;left:50%;transform:translateX(-50%);
      z-index:1000;
      background:var(--green);
      color:#fff;
      font-size:14px;font-weight:600;
      padding:8px 20px;
      border-radius:999px;
      pointer-events:none;
      white-space:nowrap;
      box-shadow:0 4px 14px rgba(0,0,0,.3);
    }
    #pin-banner.visible{display:block}

    .num-marker{
      width:32px;height:32px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.35);
    }
    .num-marker span{
      transform:rotate(45deg);
      font-size:13px;font-weight:700;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    }
  </style>
</head>

<body>

<div style="position:relative">
  <div id="pin-banner">📍 Tap anywhere on map to drop a stop</div>
  <div id="map"></div>
</div>

<div id="panel">
  <div class="card">
    <h1>Simple Route Planner</h1>
    <div class="subtitle">Fast multi-stop routing, free and no logging in :)</div>

    <label for="address" style="position:absolute;left:-9999px;">Stop address</label>
    <input id="address" placeholder="Add a stop address"
           onkeydown="if(event.key==='Enter')addStop()" />
    <button onclick="addStop()">Add Stop</button>

    <button id="pinBtn" class="ghost" onclick="togglePinMode()">
      📍 Tap Map to Add Stop
    </button>

    <button class="secondary" onclick="optimizeRoute()">Optimize Route</button>
    <button class="danger" onclick="clearAll()">Clear Route</button>
    <button class="ghost" onclick="toggleNightMode()">🌙 Night Mode</button>

    <div id="stops"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

  // tap:false tells Leaflet NOT to synthesise click events from touches itself
  // — we handle map clicks natively so they fire reliably on iOS/Android
  let map = L.map("map", { tap: false }).setView([37.7749, -122.4194], 12);

  let start      = null;
  let stops      = [];
  let markers    = [];
  let routeOrder = [];
  let routeLine  = null;
  let darkMode   = false;
  let pinMode    = false;

  // ── Tile layers ──────────────────────────────────────────
  const lightTiles = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { maxZoom:19 }
  );
  const darkTiles = L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { maxZoom:19 }
  );
  lightTiles.addTo(map);

  // ── Numbered marker factory ──────────────────────────────
  function makeNumberIcon(n, color) {
    color = color || "#007aff";
    return L.divIcon({
      className: "",
      html: `<div class="num-marker" style="background:${color}">
               <span>${n}</span>
             </div>`,
      iconSize:    [32, 32],
      iconAnchor:  [16, 32],
      popupAnchor: [0, -34]
    });
  }

  // ── Drop-pin mode ────────────────────────────────────────
  function togglePinMode() {
    pinMode = !pinMode;
    const btn    = document.getElementById("pinBtn");
    const banner = document.getElementById("pin-banner");
    const mapEl  = document.getElementById("map");

    if (pinMode) {
      btn.textContent = "✅ Tap Map Mode (ON — tap to exit)";
      btn.classList.add("pin-active");
      btn.classList.remove("ghost");
      banner.classList.add("visible");
      mapEl.classList.add("pin-mode");
      // Disable dragging so every touch = a tap, not a pan
      map.dragging.disable();
      map.touchZoom.disable();
      map.doubleClickZoom.disable();
      map.scrollWheelZoom.disable();
    } else {
      btn.textContent = "📍 Tap Map to Add Stop";
      btn.classList.remove("pin-active");
      btn.classList.add("ghost");
      banner.classList.remove("visible");
      mapEl.classList.remove("pin-mode");
      map.dragging.enable();
      map.touchZoom.enable();
      map.doubleClickZoom.enable();
      map.scrollWheelZoom.enable();
    }
  }

  // ── Map click — works on iOS, Android, and desktop ───────
  map.on("click", e => {
    if (!pinMode) return;
    if (navigator.vibrate) navigator.vibrate(30);
    pushStop([e.latlng.lat, e.latlng.lng]);
    optimizeRoute();
  });

  // ── Desktop hold-to-drop (still works when NOT in pin mode)
  let holdTimer = null;
  const HOLD_DELAY = 500;
  map.on("mousedown", e => {
    if (pinMode) return;
    holdTimer = setTimeout(() => {
      pushStop([e.latlng.lat, e.latlng.lng]);
      optimizeRoute();
    }, HOLD_DELAY);
  });
  map.on("mouseup mouseleave", () => clearTimeout(holdTimer));

  // ── Geolocation ──────────────────────────────────────────
  navigator.geolocation.getCurrentPosition(
    pos => {
      start = [pos.coords.latitude, pos.coords.longitude];
      map.setView(start, 14);
      L.marker(start, { icon: makeNumberIcon("★", "#ff9500") })
        .addTo(map)
        .bindPopup("You are here")
        .openPopup();
    },
    () => alert("Location required to build routes."),
    { enableHighAccuracy: true }
  );

  // ── Geocoding ────────────────────────────────────────────
  async function geocode(address) {
    if (!start) throw "No location";
    const [lat, lon] = start;
    const viewbox = [lon-.25, lat-.25, lon+.25, lat+.25].join(",");
    const data = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json` +
      `&q=${encodeURIComponent(address)}&limit=1&viewbox=${viewbox}&bounded=1`,
      { headers:{"Accept":"application/json"} }
    ).then(r => r.json());

    if (!data.length) {
      const fb = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json` +
        `&q=${encodeURIComponent(address)}&limit=1`
      ).then(r => r.json());
      if (!fb.length) throw "Not found";
      return [parseFloat(fb[0].lat), parseFloat(fb[0].lon)];
    }
    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
  }

  // ── Add stop via address input ────────────────────────────
  async function addStop() {
    const input = document.getElementById("address");
    const value = input.value.trim();
    if (!value || !start) return;
    try {
      const coord = await geocode(value);
      pushStop(coord);
      input.value = "";
      optimizeRoute();
    } catch {
      alert("Address not found");
    }
  }

  // ── Register a new stop ───────────────────────────────────
  function pushStop(coord) {
    stops.push(coord);
    const m = L.marker(coord, { icon: makeNumberIcon("?", "#8e8e93") })
      .addTo(map)
      .bindPopup(`Stop ${stops.length}`);
    markers.push(m);
    routeOrder.push(0);
    renderStops();
  }

  // ── Remove a stop ─────────────────────────────────────────
  function removeStop(index) {
    map.removeLayer(markers[index]);
    markers.splice(index, 1);
    stops.splice(index, 1);
    routeOrder.splice(index, 1);
    renderStops();
    if (stops.length === 0) clearPolyline();
    else optimizeRoute();
  }

  // ── Render stop list ──────────────────────────────────────
  function renderStops() {
    document.getElementById("stops").innerHTML = stops
      .map((_, i) => {
        const badge = routeOrder[i] || "?";
        return `<div class="stop">
          <div class="stop-badge">${badge}</div>
          <span class="stop-label">Stop ${i + 1}</span>
          <button class="remove" onclick="removeStop(${i})">✕</button>
        </div>`;
      }).join("");
  }

  // ── Clear polyline without touching stops ─────────────────
  function clearPolyline() {
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  }

  // ── Clear everything ──────────────────────────────────────
  function clearAll() {
    clearPolyline();
    markers.forEach(m => map.removeLayer(m));
    markers    = [];
    stops      = [];
    routeOrder = [];
    renderStops();
  }

  // ── Optimize route & update numbered markers ──────────────
  async function optimizeRoute() {
    if (!start || stops.length === 0) return;
    clearPolyline();

    const coords = [start, ...stops].map(c => `${c[1]},${c[0]}`).join(";");
    const url =
      `https://router.project-osrm.org/trip/v1/driving/${coords}` +
      `?source=first&roundtrip=false&geometries=geojson`;

    try {
      const data = await fetch(url).then(r => r.json());
      if (!data.trips) { alert("Route failed"); return; }

      // waypoints[i+1].waypoint_index = optimized trip position for stops[i]
      const waypoints = data.waypoints;
      stops.forEach((_, i) => {
        routeOrder[i] = waypoints[i + 1].waypoint_index;
      });

      // Rebase so the first stop is 1
      const minPos = Math.min(...routeOrder);
      routeOrder = routeOrder.map(p => p - minPos + 1);

      const color = darkMode ? "#0a84ff" : "#007aff";
      markers.forEach((m, i) => m.setIcon(makeNumberIcon(routeOrder[i], color)));
      renderStops();

      const route = data.trips[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(route, { color, weight:5 }).addTo(map);
      map.fitBounds(routeLine.getBounds(), { padding:[20,20] });

    } catch (err) {
      console.error(err);
      alert("Route failed");
    }
  }

  // ── Night mode ────────────────────────────────────────────
  function toggleNightMode() {
    darkMode = !darkMode;
    document.body.classList.toggle("dark", darkMode);
    if (darkMode) { map.removeLayer(lightTiles); darkTiles.addTo(map); }
    else          { map.removeLayer(darkTiles);  lightTiles.addTo(map); }
    if (stops.length > 0) optimizeRoute();
  }

</script>
</body>
</html>
