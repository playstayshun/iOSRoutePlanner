<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Route Optimizer – WORKING</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #111;
  color: #fff;
}
#map { height: 55vh; }
.controls { padding: 12px; }
input, button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}
input { background: #222; color: #fff; }
button { background: #00aaff; color: #000; font-weight: 700; }
.secondary { background: #333; color: #fff; }
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <input id="address" placeholder="Add address">
  <button onclick="addStop()">Add Stop</button>
  <button class="secondary" onclick="useLocation()">Use Current Location</button>
  <button onclick="optimize()">Optimize Route</button>
  <button class="secondary" onclick="openAppleMaps()">Open in Apple Maps</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ---------------- MAP SETUP ---------------- */
const map = L.map('map').setView([32.7767, -96.7970], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let coords = [];
let routeLayer = null;
let optimized = null;

/* ---------------- GEOCODE ---------------- */
async function geocode(addr) {
  const r = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`
  );
  const j = await r.json();
  if (!j.length) throw "not found";
  return [parseFloat(j[0].lon), parseFloat(j[0].lat)];
}

/* ---------------- ADD STOP ---------------- */
async function addStop() {
  const input = document.getElementById('address');
  if (!input.value) return;

  const [lon, lat] = await geocode(input.value);
  coords.push([lon, lat]);
  L.marker([lat, lon]).addTo(map);
  map.setView([lat, lon], 13);
  input.value = '';
}

/* ---------------- LOCATION ---------------- */
function useLocation() {
  navigator.geolocation.getCurrentPosition(p => {
    const lat = p.coords.latitude;
    const lon = p.coords.longitude;
    coords.unshift([lon, lat]);
    L.marker([lat, lon]).addTo(map).bindPopup("Start").openPopup();
    map.setView([lat, lon], 14);
  }, () => alert("Location denied"));
}

/* ---------------- OPTIMIZE (PROOF LOGS) ---------------- */
async function optimize() {
  console.log("Optimize clicked");
  console.log("Coords:", coords);

  if (coords.length < 2) {
    alert("Add at least 2 points");
    return;
  }

  if (routeLayer) map.removeLayer(routeLayer);

  const q = coords.map(c => c.join(',')).join(';');
  const url =
    `https://router.project-osrm.org/trip/v1/driving/${q}` +
    `?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  console.log("OSRM response:", data);

  if (data.code !== "Ok") {
    alert("OSRM error");
    return;
  }

  optimized = data.waypoints
    .sort((a,b)=>a.waypoint_index-b.waypoint_index)
    .map(w => coords[w.index]);

  routeLayer = L.geoJSON(data.trips[0].geometry).addTo(map);
  map.fitBounds(routeLayer.getBounds());

  alert("Route optimized ✔");
}

/* ---------------- APPLE MAPS ---------------- */
function openAppleMaps() {
  if (!optimized) {
    alert("Optimize first");
    return;
  }

  const start = optimized[0].slice().reverse().join(',');
  const end = optimized.at(-1).slice().reverse().join(',');
  const mid = optimized.slice(1,-1)
    .map(c=>c.slice().reverse().join(','))
    .join('|');

  let url = `https://maps.apple.com/?saddr=${start}&daddr=${end}&dirflg=d`;
  if (mid) url += `&waypoints=${mid}`;

  window.location.href = url;
}
</script>

</body>
</html>
