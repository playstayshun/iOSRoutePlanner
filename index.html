<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Mobile Route Optimizer</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#map {
  height: 60%;
}

#controls {
  padding: 12px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-bottom: 8px;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 8px;
  margin-bottom: 8px;
}

button:active {
  opacity: 0.8;
}

#list {
  font-size: 14px;
  color: #333;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
  <input id="address" placeholder="Enter address and tap Add" />
  <button onclick="addAddress()">Add Stop</button>
  <button onclick="optimizeRoute()">Optimize Route</button>
  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map("map");
let stops = [];
let markers = [];
let routeLine = null;
let startPoint = null;

// Load map
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

// Get current location
navigator.geolocation.getCurrentPosition(
  pos => {
    startPoint = [pos.coords.latitude, pos.coords.longitude];
    map.setView(startPoint, 13);
    L.marker(startPoint).addTo(map).bindPopup("Start").openPopup();
  },
  () => alert("Location permission required")
);

async function geocode(address) {
  let res = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`
  );
  let data = await res.json();
  if (!data.length) throw "Address not found";
  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

async function addAddress() {
  let input = document.getElementById("address");
  let addr = input.value.trim();
  if (!addr) return;

  try {
    let coord = await geocode(addr);
    stops.push(coord);
    let marker = L.marker(coord).addTo(map);
    markers.push(marker);
    input.value = "";
    updateList();
  } catch {
    alert("Could not find address");
  }
}

function updateList() {
  document.getElementById("list").innerHTML =
    stops.map((s, i) => `Stop ${i + 1}: ${s[0].toFixed(5)}, ${s[1].toFixed(5)}`).join("<br>");
}

async function optimizeRoute() {
  if (!startPoint || stops.length === 0) return;

  if (routeLine) {
    map.removeLayer(routeLine);
  }

  let coords = [startPoint, ...stops]
    .map(c => `${c[1]},${c[0]}`)
    .join(";");

  let url = `https://router.project-osrm.org/trip/v1/driving/${coords}?source=first&roundtrip=false&overview=full&geometries=geojson`;

  let res = await fetch(url);
  let data = await res.json();

  if (!data.trips || !data.trips.length) {
    alert("Route failed");
    return;
  }

  let routeCoords = data.trips[0].geometry.coordinates.map(c => [c[1], c[0]]);

  routeLine = L.polyline(routeCoords, {
    color: "blue",
    weight: 5
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}
</script>

</body>
</html>
